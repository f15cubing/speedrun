  - leaf_tag: "topic::additional::geometry"
    format: mcq
    question: "The Law of Cosines states that for a triangle with sides \\(a, b, c\\) and angle \\(C\\) opposite side \\(c\\):"
    options:
      - "\\(c^2 = a^2 + b^2 - 2ab\\cos C\\)"
      - "\\(c^2 = a^2 + b^2\\)"
      - "\\(c = a + b - 2\\cos C\\)"
      - "\\(c^2 = a^2 + b^2 + 2ab\\cos C\\)"
      - "\\(\\cos C = (a^2 + b^2) / (2ab)\\)"
    correct_index: 0
    explanation: "\\(c^2 = a^2 + b^2 - 2ab\\cos C\\). When \\(C = 90^\\circ\\) this reduces to the Pythagorean theorem."
    status: verified
    verified_by: "fc"
    verified_on: "2026-07-02"
    source: "original (law of cosines — standard geometry fact)"

  - leaf_tag: "topic::additional::geometry"
    front: "Give the midpoint of the segment connecting \\((x_1, y_1)\\) and \\((x_2, y_2)\\)."
    back: "\\(\\text{Midpoint} = \\left(\\tfrac{x_1+x_2}{2}, \\tfrac{y_1+y_2}{2}\\right)\\)."
    status: verified
    verified_by: "fc"
    verified_on: "2026-07-02"
    source: "original (midpoint formula — standard geometry fact)"

