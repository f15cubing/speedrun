    question: "In a finite group G, by Lagrange's theorem the order of every element must:"
    options:
      - "Divide |G|"
      - "Equal |G|"
      - "Be a prime number"
      - "Be even"
      - "Be at most sqrt(|G|)"
    correct_index: 0
    explanation: "Each element g generates a cyclic subgroup <g> of order equal to the order of g; by Lagrange this order divides |G|."
    status: verified
    verified_by: "fc"
    verified_on: "2026-07-02"
    source: "original (Lagrange corollary on element orders — standard abstract-algebra fact)"

  - leaf_tag: "topic::algebra::abstract"
    format: mcq
    question: "A group G is cyclic if and only if:"
    options:
      - "G is generated by a single element"
      - "Every subgroup of G is normal"
      - "G has prime order"
      - "G is abelian"
      - "G is isomorphic to Z_2"
    correct_index: 0
    explanation: "G is cyclic iff G = <g> = {g^n : n in Z} for some g in G. (Prime order implies cyclic but is not necessary; Z_2xZ_2 is abelian but not cyclic; Z_2 is only one cyclic group.)"
    status: verified
    verified_by: "fc"
    verified_on: "2026-07-02"
    source: "original (cyclic group definition — standard abstract-algebra fact)"

  - leaf_tag: "topic::algebra::abstract"
    front: "Define a ring and give two examples: one commutative and one non-commutative."
    back: "A ring is a set R with two operations (+, *) where (R, +) is an abelian group, multiplication is associative, and multiplication distributes over addition. Commutative example: Z (integers). Non-commutative example: M_2(R), the ring of 2x2 real matrices."
    status: verified
    verified_by: "fc"
    verified_on: "2026-07-02"
    source: "original (ring definition — standard abstract-algebra fact)"

  - leaf_tag: "topic::algebra::abstract"
    format: mcq
    question: "The kernel of a group homomorphism phi: G -> H is:"
    options:
      - "The set of elements of G that map to the identity of H"
      - "The image of G under phi"
      - "The set of elements of H not in the image of phi"
      - "The center of G"
      - "The set of generators of G"
    correct_index: 0
    explanation: "ker(phi) = {g in G : phi(g) = e_H}. It is always a normal subgroup of G."
    status: verified
    verified_by: "fc"
    verified_on: "2026-07-02"
    source: "original (kernel of homomorphism — standard abstract-algebra fact)"

  - leaf_tag: "topic::algebra::abstract"
    front: "Define an ideal in a ring R, and state why ideals are important."
    back: "A (two-sided) ideal I of R is a nonempty subset closed under addition and satisfying r*a in I and a*r in I for all r in R and a in I. Ideals are kernels of ring homomorphisms and allow the construction of quotient rings R/I."
    status: verified
    verified_by: "fc"
    verified_on: "2026-07-02"
    source: "original (ideal definition — standard abstract-algebra fact)"
