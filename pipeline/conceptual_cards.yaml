  - leaf_tag: "topic::additional::geometry"
    front: "State the Pythagorean theorem and its converse."
    back: "In a right triangle with legs \\(a, b\\) and hypotenuse \\(c\\): \\(a^2 + b^2 = c^2\\). Converse: if \\(a^2 + b^2 = c^2\\) then the triangle is right-angled (the right angle is opposite the side of length \\(c\\))."
    status: verified
    verified_by: "fc"
    verified_on: "2026-07-02"
    source: "original (Pythagorean theorem — standard geometry fact)"

  # --- additional::discrete (expanded) ----------------------------------------
  - leaf_tag: "topic::additional::discrete"
    format: mcq
    question: "The Inclusion-Exclusion Principle gives \\(|A \\cup B|\\) as:"
    options:
      - "\\(|A| + |B| - |A \\cap B|\\)"
      - "\\(|A| + |B| + |A \\cap B|\\)"
      - "\\(|A| \\cdot |B|\\)"
      - "\\(|A| - |B|\\)"
      - "\\(|A \\cap B|\\)"
    correct_index: 0
    explanation: "\\(|A \\cup B| = |A| + |B| - |A \\cap B|\\). Elements in the intersection are counted twice in \\(|A|+|B|\\), so we subtract once."
    status: verified
    verified_by: "fc"
    verified_on: "2026-07-02"
    source: "original (inclusion-exclusion principle — standard combinatorics fact)"

  - leaf_tag: "topic::additional::discrete"
    format: mcq
    question: "The binomial coefficient \\(\\binom{n}{k}\\) satisfies Pascal's identity:"
    options:
      - "\\(\\binom{n}{k} = \\binom{n-1}{k-1} + \\binom{n-1}{k}\\)"
      - "\\(\\binom{n}{k} = \\binom{n}{k-1} + \\binom{n}{k+1}\\)"
      - "\\(\\binom{n}{k} = n \\binom{n-1}{k}\\)"
      - "\\(\\binom{n}{k} = \\binom{n-1}{k} \\binom{n-1}{k-1}\\)"
      - "\\(\\binom{n}{k} = \\binom{n+1}{k} - \\binom{n}{k+1}\\)"
    correct_index: 0
    explanation: "Pascal's identity: \\(\\binom{n}{k} = \\binom{n-1}{k-1} + \\binom{n-1}{k}\\). It underlies Pascal's triangle."
    status: verified
    verified_by: "fc"
    verified_on: "2026-07-02"
    source: "original (Pascal's identity — standard combinatorics fact)"

  - leaf_tag: "topic::additional::discrete"
    front: "State De Morgan's laws for logical propositions \\(P\\) and \\(Q\\)."
    back: "\\(\\lnot(P \\land Q)\\) is logically equivalent to \\((\\lnot P) \\lor (\\lnot Q)\\). \\(\\lnot(P \\lor Q)\\) is logically equivalent to \\((\\lnot P) \\land (\\lnot Q)\\)."
    status: verified
    verified_by: "fc"
    verified_on: "2026-07-02"
    source: "original (De Morgan's laws — standard logic fact)"

  - leaf_tag: "topic::additional::discrete"
    format: mcq
    question: "The set of rational numbers \\(\\mathbb{Q}\\) is:"
    options:
      - "Countably infinite"
      - "Uncountably infinite"
      - "Finite"
      - "Uncountable but smaller than \\(\\mathbb{R}\\)"
      - "The same cardinality as the power set of \\(\\mathbb{N}\\)"
    correct_index: 0
    explanation: "\\(\\mathbb{Q}\\) is countably infinite: there is a bijection between \\(\\mathbb{Q}\\) and \\(\\mathbb{N}\\) (list fractions by diagonalization). \\(\\mathbb{R}\\) is uncountable."
    status: verified
    verified_by: "fc"
    verified_on: "2026-07-02"
    source: "original (countability of Q — standard set-theory fact)"

  # --- algebra::abstract (expanded) ------------------------------------------
  - leaf_tag: "topic::algebra::abstract"
    format: mcq
    question: "In a finite group \\(G\\), by Lagrange's theorem the order of every element must:"
    options:
      - "Divide \\(|G|\\)"
      - "Equal \\(|G|\\)"
      - "Be a prime number"
      - "Be even"
      - "Be at most \\(\\sqrt{|G|}\\)"
    correct_index: 0
    explanation: "Each element \\(g\\) generates a cyclic subgroup \\(\\langle g \\rangle\\) of order equal to the order of \\(g\\); by Lagrange this order divides \\(|G|\\)."
    status: verified
    verified_by: "fc"
    verified_on: "2026-07-02"
    source: "original (Lagrange corollary on element orders — standard abstract-algebra fact)"

  - leaf_tag: "topic::algebra::abstract"
    format: mcq
    question: "A group \\(G\\) is cyclic if and only if:"
    options:
      - "\\(G\\) is generated by a single element"
      - "Every subgroup of \\(G\\) is normal"
      - "\\(G\\) has prime order"
      - "\\(G\\) is abelian"
      - "\\(G\\) is isomorphic to \\(\\mathbb{Z}_2\\)"
    correct_index: 0
    explanation: "\\(G\\) is cyclic iff \\(G = \\langle g \\rangle = \\{g^n : n \\in \\mathbb{Z}\\}\\) for some \\(g \\in G\\). (Prime order implies cyclic but is not necessary; \\(\\mathbb{Z}_2 \\times \\mathbb{Z}_2\\) is abelian but not cyclic; \\(\\mathbb{Z}_2\\) is only one cyclic group.)"
    status: verified
    verified_by: "fc"
    verified_on: "2026-07-02"
    source: "original (cyclic group definition — standard abstract-algebra fact)"

  - leaf_tag: "topic::algebra::abstract"
    front: "Define a ring and give two examples: one commutative and one non-commutative."
    back: "A ring is a set \\(R\\) with two operations \\((+, \\cdot)\\) where \\((R, +)\\) is an abelian group, multiplication is associative, and multiplication distributes over addition. Commutative example: \\(\\mathbb{Z}\\) (integers). Non-commutative example: \\(M_2(\\mathbb{R})\\), the ring of \\(2 \\times 2\\) real matrices."
    status: verified
    verified_by: "fc"
    verified_on: "2026-07-02"
    source: "original (ring definition — standard abstract-algebra fact)"

  - leaf_tag: "topic::algebra::abstract"
    format: mcq
    question: "The kernel of a group homomorphism \\(\\varphi: G \\to H\\) is:"
    options:
      - "The set of elements of \\(G\\) that map to the identity of \\(H\\)"
      - "The image of \\(G\\) under \\(\\varphi\\)"
      - "The set of elements of \\(H\\) not in the image of \\(\\varphi\\)"
      - "The center of \\(G\\)"
      - "The set of generators of \\(G\\)"
    correct_index: 0
    explanation: "\\(\\ker(\\varphi) = \\{g \\in G : \\varphi(g) = e_H\\}\\). It is always a normal subgroup of \\(G\\)."
    status: verified
    verified_by: "fc"
    verified_on: "2026-07-02"
    source: "original (kernel of homomorphism — standard abstract-algebra fact)"

  - leaf_tag: "topic::algebra::abstract"
    front: "Define an ideal in a ring \\(R\\), and state why ideals are important."
    back: "A (two-sided) ideal \\(I\\) of \\(R\\) is a nonempty subset closed under addition and satisfying \\(ra \\in I\\) and \\(ar \\in I\\) for all \\(r \\in R\\) and \\(a \\in I\\). Ideals are kernels of ring homomorphisms and allow the construction of quotient rings \\(R/I\\)."
    status: verified
    verified_by: "fc"
    verified_on: "2026-07-02"
    source: "original (ideal definition — standard abstract-algebra fact)"
